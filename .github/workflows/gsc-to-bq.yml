name: GSC to BigQuery (branch-debug-safe)

on:
  workflow_dispatch:  # اجرا دستی
  # برای برنچ دیباگ، هیچ schedule‌ای نذاریم تا از main جدا باشه

jobs:
  run-gsc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-cloud-bigquery google-cloud-bigquery-storage pandas pyarrow pandas-gbq

      - name: Write Service Account Key (supports base64 or raw JSON)
        shell: bash
        run: |
          if [ -n "${{ secrets.BAMTABRIDSAZAN_GCP_SA_KEY_BASE64 }}" ]; then
            printf "%s" "${{ secrets.BAMTABRIDSAZAN_GCP_SA_KEY_BASE64 }}" | base64 --decode > gcp-key.json
            echo "WROTE: gcp-key.json from BAMTABRIDSAZAN_GCP_SA_KEY_BASE64"
          else
            if [ -n "${{ secrets.BAMTABRIDSAZAN_GCP_SA_KEY }}" ]; then
              printf "%s" "${{ secrets.BAMTABRIDSAZAN_GCP_SA_KEY }}" > gcp-key.json
              echo "WROTE: gcp-key.json from BAMTABRIDSAZAN_GCP_SA_KEY (raw)"
            else
              echo "ERROR: No secret found. Create BAMTABRIDSAZAN_GCP_SA_KEY_BASE64 or BAMTABRIDSAZAN_GCP_SA_KEY"
              exit 1
            fi
          fi
          echo "gcp-key.json size:" $(wc -c < gcp-key.json)

      - name: Validate JSON
        run: python -c "import json,sys; json.load(open('gcp-key.json')); print('✅ gcp-key.json is valid')"

      # ✅ مرحله اجرای اسکریپت، فقط روی main دیتابیس آپدیت شود
      - name: Run gsc_to_bq
        if: github.ref == 'refs/heads/main'  # 🔹 فقط main
        env:
          SERVICE_ACCOUNT_FILE: gcp-key.json
        run: python gsc_to_bq.py

      # ✅ مرحله لاگ و تست، روی هر برنچ اجرا شود
      - name: Run gsc_to_bq (debug/log only)
        if: github.ref != 'refs/heads/main'  # 🔹 روی همه شاخه‌های دیگه
        env:
          SERVICE_ACCOUNT_FILE: gcp-key.json
        run: python gsc_to_bq.py --debug
