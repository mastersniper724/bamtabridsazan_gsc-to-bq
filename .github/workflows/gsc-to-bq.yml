name: GSC to BigQuery (Debug Safe)

on:
  workflow_dispatch:
    inputs:
      debug:
        description: 'Run in debug mode (no insert to BigQuery)'
        required: false
        default: 'true'
  # اینجا می‌توانیم schedule هم اضافه کنیم در صورت نیاز، فعلاً فقط manual

jobs:
  run-gsc-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-cloud-bigquery google-cloud-bigquery-storage pandas pyarrow pandas-gbq

      - name: Write Service Account Key (supports base64 or raw JSON)
        shell: bash
        run: |
          if [ -n "${{ secrets.BAMTABRIDSAZAN_GCP_SA_KEY_BASE64 }}" ]; then
            printf "%s" "${{ secrets.BAMTABRIDSAZAN_GCP_SA_KEY_BASE64 }}" | base64 --decode > gcp-key.json
            echo "WROTE: gcp-key.json from BAMTABRIDSAZAN_GCP_SA_KEY_BASE64"
          elif [ -n "${{ secrets.BAMTABRIDSAZAN_GCP_SA_KEY }}" ]; then
            printf "%s" "${{ secrets.BAMTABRIDSAZAN_GCP_SA_KEY }}" > gcp-key.json
            echo "WROTE: gcp-key.json from BAMTABRIDSAZAN_GCP_SA_KEY (raw)"
          else
            echo "ERROR: No secret found."
            exit 1
          fi
          echo "gcp-key.json size:" $(wc -c < gcp-key.json)

      - name: Validate JSON
        run: python -c "import json; json.load(open('gcp-key.json')); print('✅ gcp-key.json is valid')"

      - name: Run gsc_to_bq in debug mode
        env:
          SERVICE_ACCOUNT_FILE: gcp-key.json
        run: |
          DEBUG_FLAG=""
          if [ "${{ github.event.inputs.debug }}" == "true" ]; then
            DEBUG_FLAG="--debug"
          fi
          echo "Running gsc_to_bq.py with debug flag: $DEBUG_FLAG"
          python gsc_to_bq.py $DEBUG_FLAG > output_debug.txt 2>&1 || echo "Script failed with exit code $?"

      - name: Upload debug log
        uses: actions/upload-artifact@v4
        with:
          name: gsc-debug-output
          path: output_debug.txt
